services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: krayin-app:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-krayin}
      DB_USERNAME: ${DB_USERNAME:-krayin}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - ./.env:/var/www/html/.env
      - app-storage:/var/www/html/storage
      - app-bootstrap-cache:/var/www/html/bootstrap/cache
    expose:
      - "80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:1.31-alpine
    restart: unless-stopped
    depends_on:
      - app
    expose:
      - "80"
    environment:
      VIRTUAL_HOST: ${DOMAIN_NAME:-localhost}
      VIRTUAL_NETWORK: ${VIRTUAL_NETWORK:-nginx-proxy}
      VIRTUAL_PORT: "80"
      LETSENCRYPT_HOST: ${DOMAIN_NAME:-localhost}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-}
    volumes:
      - ./docker/nginx:/etc/nginx/conf.d:ro
    networks:
      - internal
      - nginx-proxy

  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-krayin}
      MYSQL_USER: ${DB_USERNAME:-krayin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db-data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal

volumes:
  app-storage:
  app-bootstrap-cache:
  db-data:

networks:
  internal:
    driver: bridge
  nginx-proxy:
    external: true
    name: ${VIRTUAL_NETWORK:-nginx-proxy}
